name: Build Duke3DS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NDS packages
        run: |
          dkp-pacman -Syu --noconfirm || true
          dkp-pacman -S nds-dev --noconfirm || true
          echo "=== Verify libnds ==="
          ls -la $(DEVKITPRO)/libnds/lib/ 2>/dev/null || echo "libnds not at DEVKITPRO/libnds"
          find /opt/devkitpro -name "libnds9.a" 2>/dev/null || echo "libnds9.a not found anywhere"

      - name: Build ARM9
        run: cd arm9 && make

      - name: Build final NDS ROM
        run: make

      - name: Upload duke3d.nds
        uses: actions/upload-artifact@v4
        with:
          name: duke3d-nds
          path: duke3d.nds
          retention-days: 30
