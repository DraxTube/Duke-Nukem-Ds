name: Build Duke3DS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnose build environment
        run: |
          echo "=== all .specs files ==="
          find $DEVKITPRO -name "*.specs" 2>/dev/null
          echo "=== calico ds9.ld ==="
          cat $DEVKITPRO/calico/lib/ds9.ld
          echo "=== which libs have initSystem ==="
          arm-none-eabi-nm $DEVKITPRO/calico/lib/libnds9.a 2>/dev/null | grep "initSystem"
          arm-none-eabi-nm $DEVKITPRO/calico/lib/libcalico_ds9.a 2>/dev/null | grep "initSystem\|__libnds_mpu\|__libnds_exit\|__dsimode"
          echo "=== devkitARM lib dir ==="
          ls $DEVKITPRO/devkitARM/arm-none-eabi/lib/

      - name: Build ARM9
        run: cd arm9 && make

      - name: Build final NDS ROM
        run: make

      - name: Upload duke3d.nds
        uses: actions/upload-artifact@v4
        with:
          name: duke3d-nds
          path: duke3d.nds
          retention-days: 30
