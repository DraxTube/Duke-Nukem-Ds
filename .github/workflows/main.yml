name: Build Duke3DS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NDS development packages
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S nds-dev --noconfirm

      - name: Check library locations
        run: |
          echo "=== libnds lib dir ==="
          ls -la /opt/devkitpro/libnds/lib/ 2>/dev/null || echo "NOT FOUND"
          echo "=== calico lib dir ==="
          ls -la /opt/devkitpro/calico/lib/ 2>/dev/null || echo "NOT FOUND"
          echo "=== search for initSystem ==="
          for f in /opt/devkitpro/libnds/lib/*.a /opt/devkitpro/calico/lib/*.a; do
            if arm-none-eabi-nm "$f" 2>/dev/null | grep -q "T initSystem"; then
              echo "FOUND initSystem in $f"
            fi
          done
          echo "=== search for __libnds_mpu_setup ==="
          for f in /opt/devkitpro/libnds/lib/*.a /opt/devkitpro/calico/lib/*.a; do
            if arm-none-eabi-nm "$f" 2>/dev/null | grep -q "__libnds_mpu_setup"; then
              echo "FOUND __libnds_mpu_setup in $f"
            fi
          done
          echo "=== ds_arm9.specs ==="
          cat /opt/devkitpro/devkitARM/arm-none-eabi/lib/ds_arm9.specs 2>/dev/null || echo "NOT FOUND"
          echo "=== done ==="

      - name: Build ARM9
        run: cd arm9 && make

      - name: Build final NDS ROM
        run: make

      - name: Upload duke3d.nds
        uses: actions/upload-artifact@v4
        with:
          name: duke3d-nds
          path: duke3d.nds
          retention-days: 30
