name: Build Duke3DS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm-nds:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ARM7
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          cd arm7 && make

      - name: Build ARM9
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          cd arm9 && make

      - name: Build final NDS ROM
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          make

      - name: Upload duke3d.nds
        uses: actions/upload-artifact@v4
        with:
          name: duke3d-nds
          path: duke3d.nds
          retention-days: 30
