name: Build Duke3DS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnose build environment
        run: |
          echo "=== ds_arm9.specs ==="
          cat /opt/devkitpro/devkitARM/arm-none-eabi/lib/ds_arm9.specs
          echo "=== devkitARM arm-none-eabi lib dir ==="
          ls /opt/devkitpro/devkitARM/arm-none-eabi/lib/
          echo "=== search initSystem in all libs ==="
          for f in /opt/devkitpro/calico/lib/*.a /opt/devkitpro/devkitARM/arm-none-eabi/lib/*.a; do
            arm-none-eabi-nm "$f" 2>/dev/null | grep -l "T initSystem" && echo "  in $f" || true
          done
          echo "=== done ==="

      - name: Build ARM9
        run: cd arm9 && make

      - name: Build final NDS ROM
        run: make

      - name: Upload duke3d.nds
        uses: actions/upload-artifact@v4
        with:
          name: duke3d-nds
          path: duke3d.nds
          retention-days: 30
